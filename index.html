<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050707">
  <title>Minnesota Educational Computing Consortium : MECC-A691 Assembly Language v1.0.dsk</title>
  <style>
    :root {
      --bg: #050707;
      --line: #24443a;
      --text: #cfeee2;
      --muted: #7da193;
      --green: #63ffbd;
      --danger: #ff6d7a;
      color-scheme: dark;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: ui-monospace, "Cascadia Mono", "SFMono-Regular", Menlo, Consolas, monospace;
    }

    body {
      overflow: hidden;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0c1513;
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
      font: inherit;
      transition: border-color 120ms ease, background 120ms ease, transform 120ms ease;
      white-space: nowrap;
    }

    button:hover {
      border-color: var(--green);
      background: #12221d;
    }

    button:active {
      transform: translateY(1px);
    }

    #app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100%;
      min-width: 320px;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #0b1110 0%, #070a0a 100%);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.45);
      z-index: 2;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      color: var(--green);
      font-size: clamp(17px, 2vw, 24px);
      letter-spacing: 0;
      white-space: nowrap;
    }

    .brand span {
      overflow: hidden;
      color: var(--muted);
      font-size: 13px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .emulator-frame {
      width: 100%;
      height: 100%;
      min-height: 0;
      border: 0;
      background: #181818;
    }

    .footer {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 7px 14px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      background: #070a0a;
      font-size: 12px;
    }

    .footer span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .footer b {
      color: var(--green);
      font-weight: 700;
    }

    .footer .error {
      color: var(--danger);
    }

    @media (max-width: 720px) {
      body {
        overflow: auto;
      }

      #app {
        min-height: 100%;
        height: auto;
        grid-template-rows: auto minmax(620px, 78vh) auto;
      }

      .topbar,
      .footer {
        grid-template-columns: 1fr;
      }

      .brand {
        flex-direction: column;
        gap: 3px;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        justify-content: flex-start;
        width: 100%;
      }

      .toolbar button {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="topbar">
      <div class="brand">
        <h1>Minnesota Educational Computing Consortium</h1>
        <span>MECC-A691 Assembly Language v1.0.dsk (from Archive.org)</span>
      </div>
      <div class="toolbar">
        <button id="reloadDisk" type="button">Reload Disk</button>
      </div>
    </header>

    <iframe
      id="emulator"
      class="emulator-frame"
      title="Apple2TS emulator running the MECC Apple Assembly Language disk"
      allow="fullscreen"
      referrerpolicy="no-referrer"
    ></iframe>

    <footer class="footer">
      <span id="diskStatus">Preparing disk image.</span>
      <span><b>Disk:</b> MECC-T691 Apple Assembly Language v1.0.dsk</span>
    </footer>
  </div>

  <script>
    "use strict";

    const APPLE2TS_PATH = "apple2ts/";
    const APPLE2TS_ORIGIN = window.location.origin;
    const POST_TARGET_ORIGIN = APPLE2TS_ORIGIN === "null" ? "*" : APPLE2TS_ORIGIN;
    const DISK_IMAGE_NAME = "MECC-T691 Apple Assembly Language v1.0.dsk";
    const POST_ATTEMPTS = 3;

    const emulator = document.getElementById("emulator");
    const statusLine = document.getElementById("diskStatus");
    const reloadButton = document.getElementById("reloadDisk");
    let mountTimer = null;

    const params = new URLSearchParams({
      appmode: "embed",
      machine: "apple2p",
      color: "green",
      speed: "normal",
      sound: "off",
      theme: "dark"
    });

    function setStatus(text, isError) {
      statusLine.textContent = text;
      statusLine.classList.toggle("error", Boolean(isError));
    }

    function loadEmulator() {
      setStatus("Loading Apple2TS.");
      emulator.src = APPLE2TS_PATH + "?" + params.toString();
    }

    async function fetchDiskBytes() {
      const response = await fetch(encodeURI(DISK_IMAGE_NAME), { cache: "no-store" });
      if (!response.ok) {
        throw new Error("HTTP " + response.status);
      }
      return new Uint8Array(await response.arrayBuffer());
    }

    async function mountDisk() {
      try {
        if (mountTimer) {
          window.clearInterval(mountTimer);
          mountTimer = null;
        }
        setStatus("Reading local disk image.");
        const data = await fetchDiskBytes();
        let attempts = 0;
        const postDisk = () => {
          attempts += 1;
          emulator.contentWindow.postMessage({
            type: "loadDisk",
            filename: DISK_IMAGE_NAME,
            data
          }, POST_TARGET_ORIGIN);
          setStatus("Mounted " + DISK_IMAGE_NAME + " (" + data.length + " bytes).");
          if (attempts >= POST_ATTEMPTS) {
            window.clearInterval(mountTimer);
            mountTimer = null;
          }
        };
        mountTimer = window.setInterval(postDisk, 1500);
        postDisk();
      } catch (error) {
        setStatus("Disk load failed: " + error.message, true);
      }
    }

    emulator.addEventListener("load", () => {
      window.setTimeout(mountDisk, 500);
    });
    reloadButton.addEventListener("click", mountDisk);
    loadEmulator();
    window.setTimeout(() => {
      if (!/Mounted|failed|Reading/.test(statusLine.textContent)) {
        mountDisk();
      }
    }, 4500);
  </script>
</body>
</html>
